# cargo-nextest configuration.

[profile.default]
# A test running much longer than this is almost certainly hung (e.g. a daemon
# that never drains). Flag it, then terminate.
slow-timeout = { period = "20s", terminate-after = 3 }
fail-fast = false

[profile.ci]
fail-fast = false
failure-output = "immediate-final"
final-status-level = "flaky"

[profile.ci.junit]
path = "junit.xml"
